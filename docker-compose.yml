services:
  postgres:
    image: postgres:16-alpine
    container_name: edu-app-postgres
    environment:
      POSTGRES_USER: eduapp
      POSTGRES_PASSWORD: eduapp_dev
      POSTGRES_DB: eduapp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
