<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="grainA">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="14" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12" />
      </feComponentTransfer>
    </filter>
    <radialGradient id="wash1" cx="20%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#2f6b98" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#2f6b98" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="wash2" cx="80%" cy="75%" r="70%">
      <stop offset="0%" stop-color="#194b77" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#194b77" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="wash3" cx="50%" cy="52%" r="55%">
      <stop offset="0%" stop-color="#123d6b" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#123d6b" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="#060610" />
  <rect width="1600" height="1000" fill="url(#wash1)" />
  <rect width="1600" height="1000" fill="url(#wash2)" />
  <rect width="1600" height="1000" fill="url(#wash3)" />
  <rect width="1600" height="1000" filter="url(#grainA)" fill="#fff" />
