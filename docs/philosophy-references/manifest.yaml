        tier: T2
        title: "For the Children's Sake"
        author: "Susan Schaeffer Macaulay"
        year: 1984
        status: pending-extraction
        rationale: "The book that revived Charlotte Mason in North America. Distills Mason's core ideas into accessible modern language. Replaces Karen Glass 'Consider This' (unavailable as ebook)."

