# Philosophy References — Source Manifest
#
# Single source of truth for what's in the KG and why.
# Tiers: T1 Foundational / T2 Commentary / T3 Supplemental
# Target: 5-8 sources per philosophy, ~60-80 extracted principles each.
#
# Status values:
#   extracted            — file present and principles extracted into KG
#   pending-extraction   — file present but not yet extracted
#   pending-acquisition  — not yet obtained (filename: null until acquired)
#   evaluate             — needs human decision on keep vs. drop
#   dropped              — excluded from KG extraction (may remain in directory)
#
# Generated: 2026-03-21, updated: 2026-03-22 (all acquisitions complete)
# See: docs/plans/2026-03-21-kg-source-audit.md

philosophies:

