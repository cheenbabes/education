    sources:
      - filename: "Mason-Vol1-Home_Education.epub"
        tier: T1
        title: "Home Education (Vol 1)"
        author: "Charlotte Mason"
        year: 1886
        status: extracted
        rationale: "Opening volume — foundational philosophy, habit training, nature study, narration"

      - filename: "Mason-Vol6-Philosophy_of_Education.epub"
        tier: T1
        title: "Towards a Philosophy of Education (Vol 6)"
        author: "Charlotte Mason"
        year: 1923
        status: extracted
        rationale: "Final volume — most distilled and mature expression of her 20 principles"

